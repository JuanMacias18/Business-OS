name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  ff3-service-role-grep:
    name: "FF-3: service_role fuera de apps/ y packages/"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: grep service_role
        run: |
          if grep -rn "service_role" --include="*.ts" --include="*.tsx" apps packages 2>/dev/null; then
            echo "::error::service_role encontrado en apps/ o packages/ — debe vivir solo en supabase/functions/"
            exit 1
          fi
          echo "OK: sin service_role fuera de supabase/functions/"

  supabase-db-test:
    name: supabase test db (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase start
      - run: supabase test db
      - if: always()
        run: supabase stop --no-backup

  deno-functions-test:
    name: "deno test (Edge Functions + concurrencia, incl. FF-4 replay y LOOP B)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase start

      - name: Exportar credenciales del stack local
        id: creds
        run: |
          status=$(supabase status -o json)
          echo "url=$(echo "$status" | jq -r .API_URL)" >> "$GITHUB_OUTPUT"
          echo "service_role_key=$(echo "$status" | jq -r .SERVICE_ROLE_KEY)" >> "$GITHUB_OUTPUT"
          echo "anon_key=$(echo "$status" | jq -r .ANON_KEY)" >> "$GITHUB_OUTPUT"

      - name: deno test
        env:
          SUPABASE_URL: ${{ steps.creds.outputs.url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.creds.outputs.service_role_key }}
          SUPABASE_ANON_KEY: ${{ steps.creds.outputs.anon_key }}
          # Secrets de sandbox de Wompi (Settings -> Secrets -> Actions).
          # Sin configurarlos, los tests de Fase 5 que llaman a la API
          # real de Wompi se saltan solos (no fallan) -- ver 03-07.
          WOMPI_TEST_PUBLIC_KEY: ${{ secrets.WOMPI_TEST_PUBLIC_KEY }}
          WOMPI_TEST_PRIVATE_KEY: ${{ secrets.WOMPI_TEST_PRIVATE_KEY }}
          WOMPI_TEST_EVENTS_SECRET: ${{ secrets.WOMPI_TEST_EVENTS_SECRET }}
          WOMPI_TEST_INTEGRITY_SECRET: ${{ secrets.WOMPI_TEST_INTEGRITY_SECRET }}
        run: deno test --config supabase/functions/deno.json --allow-net --allow-env --allow-read supabase/functions supabase/tests/concurrency

      - if: always()
        run: supabase stop --no-backup

  e2e-panel:
    name: "e2e panel (aislamiento de tenant, Playwright)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase start

      - name: Generar apps/panel/.env.local con credenciales del stack local
        run: |
          status=$(supabase status -o json)
          url=$(echo "$status" | jq -r .API_URL)
          anon_key=$(echo "$status" | jq -r .ANON_KEY)
          echo "VITE_SUPABASE_URL=$url" > apps/panel/.env.local
          echo "VITE_SUPABASE_ANON_KEY=$anon_key" >> apps/panel/.env.local

      - run: npx playwright install --with-deps chromium

      - run: pnpm e2e

      - if: always()
        run: supabase stop --no-backup
